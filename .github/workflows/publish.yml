name: publish-package
run-name: publish to mooncakes

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-package
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: mooncakes
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: version
        run: |
          moon version --all
          moonrun --version

      - name: update registry
        run: sh tools/run_moon_clean_exec.sh update

      - name: build
        run: sh tools/run_moon_clean_exec.sh build --target all

      - name: documentation
        run: python3 tools/run_docs.py

      - name: format
        run: sh tools/run_moon_clean_exec.sh fmt --check

      - name: check
        run: sh tools/run_moon_clean_exec.sh check --target all --deny-warn --frozen

      - name: test
        run: sh tools/run_moon_clean_exec.sh test --enable-coverage --deny-warn --frozen

      - name: publish
        env:
          SECRET: ${{ secrets.LUNA_MOONCAKE }}
        run: |
          test -n "$SECRET"
          mkdir -p "$HOME/.moon"
          trap 'rm -f "$HOME/.moon/credentials.json"' EXIT
          printf '%s' "$SECRET" > "$HOME/.moon/credentials.json"
          sh tools/run_moon_clean_exec.sh publish --frozen
